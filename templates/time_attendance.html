<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Time and Attendance</title>
    <link rel="icon" href="/static/pcm-lockup-goldc-final.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/static/styles.css?v={{ time }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        .refresh-btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .refresh-btn:hover {
            background: #2563eb;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }

        .stat-label {
            font-size: 0.85rem;
            color: #6b7280;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #111827;
        }

        .no-data {
            padding: 40px;
            text-align: center;
            color: #9ca3af;
        }

        .card-head .export-button,
        .card-head #export-pdf-btn {
            top: 0;
        }

        .header-filter {
            width: 100%;
            box-sizing: border-box;
            height: 26px;
            padding: 4px 6px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            font-size: 0.78rem;
            margin-top: 4px;
        }

        #sessionsTable thead th[data-col] {
            position: relative;
            vertical-align: top;
        }

        #sessionsTable thead th[data-col] .header-label {
            display: block;
        }

        .filter-toggle {
            margin-top: 0;
            border: 1px solid rgba(148, 163, 184, 0.45);
            background: rgba(248, 250, 252, 0.92);
            border-radius: 3px;
            font-size: 10px;
            color: #6b7280;
            cursor: pointer;
            width: 14px;
            height: 14px;
            line-height: 12px;
            padding: 0;
            opacity: 0.9;
        }

        #sessionsTable thead th[data-col] .filter-toggle {
            position: absolute;
            top: 50%;
            right: 3px;
            transform: translateY(-50%);
        }

        .filter-toggle:hover {
            color: #111827;
            border-color: #cbd5e1;
        }

        .flags-list {
            display: grid;
            gap: 8px;
        }

        .flag-row {
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 8px 10px;
            background: #fff;
        }

        .flag-row .top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            font-size: 0.82rem;
            font-weight: 700;
            color: #111827;
            margin-bottom: 4px;
        }

        .flag-row .reason {
            font-size: 0.78rem;
            color: #6b7280;
            line-height: 1.3;
        }

        .flag-type-pill {
            font-size: 0.7rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 999px;
            background: #fee2e2;
            color: #991b1b;
            white-space: nowrap;
        }
    </style>
</head>

<body class="home-dashboard">
    <!-- Sidebar -->
    <div class="sidebar">

        <!-- Module navigation -->
        <div class="nav-top">
            <a href="/time-attendance"
                class="{{ 'active' if section == 'time-attendance' else '' }}"><span>Employees</span></a>
            <a href="/time-attendance-dashboard"
                class="{{ 'active' if section == 'time-attendance-dashboard' else '' }}"><span>Time
                    and Attendance</span></a>
            <a href="/hours-accumulated"
                class="{{ 'active' if section == 'accumulated-hours' else '' }}"><span>Accumulated Hours</span></a>
        </div>
        <div class="sidebar-mid">
            <a href="/" class="sidebar-return" title="Return">↺ Return</a>
        </div>

        <!-- Bottom navigation -->
        <div class="nav-bottom">
            {% if request.session.get('is_admin') %}
            <a href="/admin?module=biometric"
                class="{{ 'active' if section == 'admin' else '' }}"><span>Admin</span></a>
            {% endif %}

            <a href="/settings?module=biometric"
                class="{{ 'active' if section == 'settings' else '' }}"><span>Settings</span></a>
            <a href="/logout" id="logoutLink" class="{{ 'active' if section == 'logout' else '' }}">
                <span>Log Out</span>
            </a>
        </div>
        <button id="sidebarHandle" class="sidebar-handle" aria-label="Collapse sidebar" aria-pressed="false"
            title="Collapse sidebar"> <span class="handle-icon" aria-hidden="true">⟨</span> </button>
    </div>

    <!-- Main content area -->
    <div class="content4">
        <div class="contentInner4">
            <div class="dash-grid biometric-grid">
                <!-- Sessions -->
                <section class="card card--tall sessions-card">
                    <header class="card-head">
                        <div></div>
                        <div style="display:flex; gap:10px; align-items:center;">
                            <span class="muted" style="font-size:12px;">Export:</span>
                            <button id="export-btn" class="export-button" type="button" aria-label="Export Excel">
                                <img src="/static/excel-document.svg" alt="Excel" class="excel-icon">
                            </button>
                            <button id="export-pdf-btn" type="button" aria-label="Export PDF">
                                <img src="/static/download.svg" alt="PDF Icon" class="pdf-icon">
                            </button>
                            <input id="filterStartDate" type="date" class="input" style="height:32px;" />
                            <input id="filterEndDate" type="date" class="input" style="height:32px;" />
                        </div>
                    </header>
                    <div class="table-wrap">
                        <table class="small-table time-attendance-table" id="sessionsTable">
                            <colgroup>
                                <col class="col-name" />
                                <col class="col-company" />
                                <col class="col-site" />
                                <col class="col-division" />
                                <col class="col-check-in" />
                                <col class="col-check-out" />
                                <col class="col-duration" />
                            </colgroup>
                            <thead>
                                <tr>
                                    <th data-col="name">
                                        <div class="header-label">Name &amp; Surname</div>
                                        <input type="text" class="header-filter" data-col="name"
                                            style="display:none;" />
                                        <button class="filter-toggle" data-col="name" aria-label="Filter">⌕</button>
                                    </th>
                                    <th data-col="company">
                                        <div class="header-label">Company</div>
                                        <input type="text" class="header-filter" data-col="company"
                                            style="display:none;" />
                                        <button class="filter-toggle" data-col="company" aria-label="Filter">⌕</button>
                                    </th>
                                    <th data-col="site">
                                        <div class="header-label">Site</div>
                                        <input type="text" class="header-filter" data-col="site"
                                            style="display:none;" />
                                        <button class="filter-toggle" data-col="site" aria-label="Filter">⌕</button>
                                    </th>
                                    <th data-col="division">
                                        <div class="header-label">Division</div>
                                        <input type="text" class="header-filter" data-col="division"
                                            style="display:none;" />
                                        <button class="filter-toggle" data-col="division" aria-label="Filter">⌕</button>
                                    </th>
                                    <th data-col="check_in">
                                        <div class="header-label">Check-in</div>
                                        <input type="text" class="header-filter" data-col="check_in"
                                            style="display:none;" />
                                        <button class="filter-toggle" data-col="check_in" aria-label="Filter">⌕</button>
                                    </th>
                                    <th data-col="check_out">
                                        <div class="header-label">Check-out</div>
                                        <input type="text" class="header-filter" data-col="check_out"
                                            style="display:none;" />
                                        <button class="filter-toggle" data-col="check_out"
                                            aria-label="Filter">⌕</button>
                                    </th>
                                    <th data-col="duration">
                                        <div class="header-label">Duration</div>
                                        <input type="text" class="header-filter" data-col="duration"
                                            style="display:none;" />
                                        <button class="filter-toggle" data-col="duration" aria-label="Filter">⌕</button>
                                    </th>
                                </tr>
                            </thead>
                            <tbody id="sessionsBody">
                                <tr>
                                    <td colspan="7" class="muted">Loading sessions...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </section>

                <section class="card card--tall">
                    <header class="card-head">
                        <h2>Session Flags</h2>
                        <span class="pill" id="sessionFlagsCount">0</span>
                    </header>
                    <div class="table-wrap" style="padding:10px; overflow:auto;">
                        <div id="sessionFlagsBody" class="flags-list">
                            <div class="muted">Loading flags...</div>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <script>
        let autoRefreshInterval;
        let sessionsData = [];
        const sessionColumnFilters = {
            name: '',
            company: '',
            site: '',
            division: '',
            check_in: '',
            check_out: '',
            duration: ''
        };

        function fmt(ts) {
            if (!ts) return '-';
            return new Date(ts).toLocaleString();
        }

        function formatDuration(seconds) {
            if (seconds === null || seconds === undefined) return '-';
            const total = Math.max(0, Number(seconds));
            const hours = Math.floor(total / 3600);
            const minutes = Math.floor((total % 3600) / 60);
            const secs = Math.floor(total % 60);
            return `${hours}h ${minutes}m ${secs}s`;
        }

        function formatFlagType(flagType) {
            if (!flagType) return 'Flag';
            return String(flagType).replace(/_/g, ' ');
        }

        async function refreshSessionFlags() {
            const body = document.getElementById('sessionFlagsBody');
            const countEl = document.getElementById('sessionFlagsCount');
            if (!body || !countEl) return;

            const res = await fetch('/api/session-flags?status=open&limit=50');
            if (!res.ok) {
                body.innerHTML = '<div class="muted">Could not load flags</div>';
                return;
            }

            const flags = await res.json();
            const rows = Array.isArray(flags) ? flags : [];
            countEl.innerText = String(rows.length);

            if (!rows.length) {
                body.innerHTML = '<div class="muted">No open session flags</div>';
                return;
            }

            body.innerHTML = rows.map((flag) => {
                const ts = flag.event_timestamp ? fmt(flag.event_timestamp) : '-';
                const type = formatFlagType(flag.flag_type);
                return `
                    <div class="flag-row">
                        <div class="top">
                            <span>PIN ${flag.pin || '-'}</span>
                            <span class="flag-type-pill">${type}</span>
                        </div>
                        <div class="reason">${flag.flag_reason || '-'}<br><small>${ts}</small></div>
                    </div>
                `;
            }).join('');
        }

        function getSessionTableData() {
            const table = document.getElementById('sessionsTable');
            if (!table) return { headers: [], body: [] };

            const headers = Array.from(table.querySelectorAll('thead tr:first-child th')).map(th => {
                const label = th.querySelector('.header-label');
                return (label ? label.textContent : th.textContent).trim();
            });
            const body = [];

            table.querySelectorAll('tbody tr').forEach(tr => {
                const cells = Array.from(tr.querySelectorAll('td')).map(td => td.textContent.trim());
                if (!cells.length) return;
                if (cells.length === 1 && tr.querySelector('.muted')) return;
                body.push(cells);
            });

            return { headers, body };
        }

        function downloadFile(filename, text, mime) {
            const blob = new Blob([text], { type: mime });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(url);
        }

        function exportSessionsCsv() {
            const { headers, body } = getSessionTableData();
            if (!headers.length || !body.length) {
                alert('No data to export.');
                return;
            }

            const csvHeaders = headers.map(h => `"${h.replace(/"/g, '""')}"`).join(',');
            const csvRows = body
                .map(row => row.map(cell => `"${(cell || '').replace(/"/g, '""')}"`).join(','))
                .join('\n');
            downloadFile('time_attendance_export.csv', `${csvHeaders}\n${csvRows}`, 'text/csv;charset=utf-8;');
        }

        function exportSessionsPdf() {
            const { headers, body } = getSessionTableData();
            if (!headers.length || !body.length) {
                alert('No data to export.');
                return;
            }

            const jspdfNS = window.jspdf;
            const jsPDF = jspdfNS && jspdfNS.jsPDF;
            if (!jsPDF || !('autoTable' in (jsPDF.API || {}))) {
                alert('PDF library not loaded.');
                return;
            }

            const doc = new jsPDF('landscape', 'pt', 'a4');
            doc.setFontSize(12);
            doc.text('Time and Attendance Export', 40, 30);
            doc.autoTable({
                head: [headers],
                body,
                startY: 45,
                styles: { fontSize: 8, cellPadding: 4, overflow: 'linebreak' },
                headStyles: { fillColor: [75, 94, 112] },
                margin: { left: 20, right: 20 }
            });
            doc.save('time_attendance_export.pdf');
        }

        function getSessionColumnValue(session, col) {
            if (col === 'name') return String(session.full_name || '').toLowerCase();
            if (col === 'company') return String(session.company || '').toLowerCase();
            if (col === 'site') return String(session.site || '').toLowerCase();
            if (col === 'division') return String(session.division || '').toLowerCase();
            if (col === 'check_in') return String(fmt(session.check_in) || '').toLowerCase();
            if (col === 'check_out') return String(fmt(session.check_out) || '').toLowerCase();
            if (col === 'duration') return String(formatDuration(session.duration_seconds) || '').toLowerCase();
            return '';
        }

        function renderSessions(rows) {
            const body = document.getElementById('sessionsBody');
            if (!rows.length) {
                body.innerHTML = '<tr><td colspan="7" class="muted">No sessions found</td></tr>';
                return;
            }

            body.innerHTML = rows.map(s => {
                const name = s.full_name || '-';
                const company = s.company || '-';
                const site = s.site || '-';
                const division = s.division || '-';
                const dur = formatDuration(s.duration_seconds);
                return `
                    <tr>
                        <td>${name}</td>
                        <td>${company}</td>
                        <td>${site}</td>
                        <td>${division}</td>
                        <td>${fmt(s.check_in)}</td>
                        <td>${fmt(s.check_out)}</td>
                        <td>${dur}</td>
                    </tr>
                `;
            }).join('');
        }

        function applySessionFilters() {
            const filtered = sessionsData.filter((session) => {
                return Object.entries(sessionColumnFilters).every(([col, filterVal]) => {
                    if (!filterVal) return true;
                    return getSessionColumnValue(session, col).includes(filterVal);
                });
            });
            renderSessions(filtered);
        }

        function bindSessionColumnFilters() {
            document.querySelectorAll('#sessionsTable .filter-toggle').forEach((btn) => {
                const col = btn.dataset.col;
                const th = btn.closest('th');
                const input = th?.querySelector('.header-filter');
                if (!input) return;

                btn.addEventListener('click', () => {
                    btn.style.display = 'none';
                    input.style.display = 'inline-block';
                    input.focus();
                });

                input.addEventListener('input', () => {
                    sessionColumnFilters[col] = input.value.trim().toLowerCase();
                    applySessionFilters();
                });

                input.addEventListener('blur', () => {
                    if (!input.value.trim()) {
                        input.style.display = 'none';
                        btn.style.display = 'inline-block';
                    }
                });

                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') {
                        input.value = '';
                        sessionColumnFilters[col] = '';
                        applySessionFilters();
                        input.style.display = 'none';
                        btn.style.display = 'inline-block';
                    }
                });
            });
        }

        async function refreshSessions() {
            const startInput = document.getElementById('filterStartDate');
            const endInput = document.getElementById('filterEndDate');
            const today = new Date().toISOString().slice(0, 10);
            const startVal = startInput.value || today;
            const endVal = endInput.value || today;

            const url = `/api/sessions/today?start_date=${startVal}&end_date=${endVal}`;
            const res = await fetch(url);
            if (!res.ok) return;
            const sessions = await res.json();
            sessionsData = Array.isArray(sessions) ? sessions : [];
            applySessionFilters();

        }

        // Auto-refresh every 5 seconds
        document.addEventListener('DOMContentLoaded', () => {
            const today = new Date().toISOString().slice(0, 10);
            const startInput = document.getElementById('filterStartDate');
            const endInput = document.getElementById('filterEndDate');
            const sessionsBody = document.getElementById('sessionsBody');
            startInput.value = today;
            endInput.value = today;
            bindSessionColumnFilters();
            startInput.addEventListener('change', refreshSessions);
            endInput.addEventListener('change', refreshSessions);
            refreshSessions();
            refreshSessionFlags();
            autoRefreshInterval = setInterval(() => {
                refreshSessions();
                refreshSessionFlags();
            }, 5000);

            document.getElementById('export-btn')?.addEventListener('click', exportSessionsCsv);
            document.getElementById('export-pdf-btn')?.addEventListener('click', exportSessionsPdf);

            sessionsBody?.addEventListener('click', (event) => {
                const row = event.target.closest('tr');
                if (!row) return;
                row.classList.toggle('row-expanded');
            });

            // Sidebar toggle
            const handle = document.getElementById("sidebarHandle");
            function toggleSidebar() {
                document.body.classList.toggle("sidebar-collapsed");
                handle?.setAttribute("aria-pressed", String(document.body.classList.contains("sidebar-collapsed")));
            }
            handle?.addEventListener("click", toggleSidebar);

            // Logout handler
            const logoutLink = document.getElementById("logoutLink");
            if (logoutLink) {
                logoutLink.addEventListener("click", function (e) {
                    e.preventDefault();
                    const confirmed = confirm("Are you sure you want to log out?");
                    if (confirmed) {
                        window.location.href = this.href;
                    }
                });
            }
        });

        // Clear interval on page unload
        window.addEventListener('beforeunload', () => {
            if (autoRefreshInterval) clearInterval(autoRefreshInterval);
        });
    </script>
</body>

</html>
