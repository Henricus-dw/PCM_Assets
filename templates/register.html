<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Create account</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="/static/pcm-lockup-goldc-final.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/static/ui/main.css" />
    <link rel="stylesheet" href="/static/ui/pages/auth.css" />
</head>

<body class="auth-register">
    <main class="auth-card">
        <h1>Create account</h1>
        {% if error %}
        <div class="auth-error">{{ error }}</div>
        {% endif %}
        <form class="auth-form" method="post" action="/register" autocomplete="on">
            <div class="auth-field">
                <label for="name">Name</label>
                <input id="name" name="name" required />
            </div>
            <div class="auth-field">
                <label for="surname">Surname</label>
                <input id="surname" name="surname" required />
            </div>
            <div class="auth-field">
                <label for="email">Email address</label>
                <input id="email" name="email" type="email" required autocomplete="email" />
            </div>
            <div class="auth-field">
                <label for="password">Password</label>
                <input id="password" name="password" type="password" required autocomplete="new-password" />
            </div>
            <div class="auth-field">
                <label for="confirm_password">Confirm password</label>
                <input id="confirm_password" name="confirm_password" type="password" required
                    autocomplete="new-password" />
            </div>
            <button class="auth-submit" type="submit">Request approval</button>
        </form>
        <p class="auth-footer">
            <a href="/login">Back to sign in</a>
        </p>
    </main>
</body>

</html>
