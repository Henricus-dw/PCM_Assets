<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Sign in</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="/static/pcm-lockup-goldc-final.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/static/ui/main.css" />
    <link rel="stylesheet" href="/static/ui/pages/auth.css" />
</head>

<body class="auth-login">
    <main class="auth-card">
        <div class="auth-logo">
            <img src="/static/pcm-lockup-goldc-final.svg" alt="PCM logo" />
        </div>
        <h1>Sign in</h1>
        {% if error %}
        <div class="auth-error">{{ error }}</div>
        {% endif %}
        <form class="auth-form" method="post" action="/login" autocomplete="on">
            <div class="auth-field">
                <label for="email">Email address</label>
                <input id="email" name="email" type="email" required autocomplete="email" />
            </div>
            <div class="auth-field">
                <label for="password">Password</label>
                <input id="password" name="password" type="password" required autocomplete="current-password" />
            </div>
            <button class="auth-submit" type="submit">Sign in</button>
        </form>
        <p class="auth-footer">
            <a href="/register">Create an account</a>
        </p>
    </main>
</body>

</html>
